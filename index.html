<style>
:root{--bg:#080810;--bg2:#0f0f1a;--bg3:#16162a;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#eeeef5;--text2:#8888aa;--text3:#444460;--accent:#6C63FF;--accent2:#9B89FF;--green:#22d3a5;--amber:#f59e0b;--red:#FF5E5B;--glow:rgba(108,99,255,0.15);}
[data-theme="light"]{--bg:#f4f4fb;--bg2:#fff;--bg3:#eaeaf5;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);--text:#12121f;--text2:#555570;--text3:#aaaacc;--glow:rgba(108,99,255,0.08);}
[data-theme="light"] .bg-grid{background-image:linear-gradient(rgba(108,99,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,0.05) 1px,transparent 1px);}
[data-theme="light"] nav{background:rgba(244,244,251,0.9);}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;line-height:1.6;overflow-x:hidden;}
body.lang-he{font-family:'Heebo',sans-serif;direction:rtl;}
body.lang-he .ltr-only{display:none!important;}
body:not(.lang-he) .rtl-only{display:none!important;}

.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(108,99,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse,rgba(108,99,255,0.12) 0%,transparent 70%);pointer-events:none;z-index:0;}
.container{max-width:1000px;margin:0 auto;padding:0 24px;position:relative;z-index:1;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 24px;background:rgba(8,8,16,0.88);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.nav-logo span{color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;}

/* Language buttons */
.lang-group{display:flex;background:var(--bg3);border:0.5px solid var(--border2);border-radius:100px;padding:3px;gap:2px;}
.btn-lang{background:transparent;border:none;border-radius:100px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
.btn-lang.active{background:var(--accent);color:#fff;}
.btn-lang:hover:not(.active){color:var(--text);}

.btn-theme{width:34px;height:34px;border-radius:50%;border:0.5px solid var(--border2);background:rgba(255,255,255,0.04);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s;flex-shrink:0;}
.btn-theme:hover{background:rgba(255,255,255,0.1);}
.kofi-nav{display:flex;align-items:center;gap:6px;background:var(--red);border:none;border-radius:100px;padding:7px 14px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;text-decoration:none;font-family:inherit;transition:transform .15s,opacity .15s;white-space:nowrap;}
.kofi-nav:hover{transform:translateY(-1px);opacity:.9;}
.kofi-nav svg{width:14px;height:14px;flex-shrink:0;}

/* HERO */
.hero{padding:150px 0 70px;text-align:center;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(108,99,255,0.1);border:0.5px solid rgba(108,99,255,0.3);border-radius:100px;padding:5px 14px;font-size:12px;color:var(--accent2);font-weight:500;margin-bottom:24px;animation:fadeUp .6s ease both;}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
h1{font-family:'Syne',sans-serif;font-size:clamp(30px,5vw,58px);font-weight:800;line-height:1.05;letter-spacing:-0.03em;margin-bottom:18px;animation:fadeUp .6s .1s ease both;}
h1 em{font-style:normal;color:var(--accent);}
.hero-sub{font-size:clamp(14px,2vw,17px);color:var(--text2);max-width:520px;margin:0 auto 44px;font-weight:300;animation:fadeUp .6s .2s ease both;}
.hero-actions{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;animation:fadeUp .6s .3s ease both;}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:100px;padding:13px 26px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;transition:transform .15s,box-shadow .15s;box-shadow:0 0 30px rgba(108,99,255,0.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(108,99,255,0.5);}
.btn-kofi-hero{display:flex;align-items:center;gap:8px;background:transparent;border:0.5px solid var(--border2);border-radius:100px;padding:13px 26px;font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;color:var(--text);font-family:inherit;transition:all .15s;}
.btn-kofi-hero:hover{background:rgba(255,94,91,0.1);border-color:rgba(255,94,91,0.4);color:#FF5E5B;}
.btn-kofi-hero svg{width:16px;height:16px;}

/* STATS */
.stats{display:flex;justify-content:center;gap:44px;padding:36px 0;flex-wrap:wrap;border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);margin-bottom:64px;animation:fadeUp .6s .4s ease both;}
.stat{text-align:center;}
.stat-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--text);display:block;}
.stat-label{font-size:12px;color:var(--text2);}

/* SECTION */
.section{margin-bottom:64px;}
.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.section-title{font-family:'Syne',sans-serif;font-size:clamp(22px,4vw,34px);font-weight:800;letter-spacing:-0.02em;margin-bottom:24px;color:var(--text);}

/* SEARCH */
.tools-controls{margin-bottom:22px;display:flex;flex-direction:column;gap:12px;}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
body.lang-he .search-icon{left:auto;right:16px;}
.search-icon svg{width:15px;height:15px;display:block;}
#searchInput{width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:12px 16px 12px 44px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s;}
body.lang-he #searchInput{padding:12px 44px 12px 16px;}
#searchInput:focus{border-color:var(--accent);}
#searchInput::placeholder{color:var(--text3);}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;}
.filter-pill{padding:7px 14px;border-radius:100px;font-size:12px;font-weight:600;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;}
.filter-pill:hover{border-color:var(--border2);color:var(--text);}
.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.no-results{text-align:center;padding:48px 0;color:var(--text2);font-size:15px;display:none;}

/* APPS GRID */
.apps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.app-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:26px;text-decoration:none;color:var(--text);position:relative;overflow:hidden;transition:transform .22s cubic-bezier(.22,.68,0,1.2),box-shadow .22s ease,border-color .22s ease;display:flex;flex-direction:column;}
.app-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--glow) 0%,transparent 60%);opacity:0;transition:opacity .3s;}
.app-card:hover{transform:translateY(-5px) scale(1.016);border-color:var(--border2);box-shadow:0 20px 48px rgba(0,0,0,0.5),0 0 0 1px rgba(108,99,255,0.22);}
.app-card:hover::before{opacity:1;}
.app-card.hidden{display:none;}
.app-icon{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;flex-shrink:0;transition:transform .2s ease;}
.app-card:hover .app-icon{transform:scale(1.1) rotate(-4deg);}
.icon-green{background:rgba(34,211,165,0.12);}
.app-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:8px;}
.app-desc{font-size:13px;color:var(--text2);line-height:1.55;flex:1;margin-bottom:18px;}
.app-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.tag{font-size:10px;padding:3px 9px;border-radius:100px;font-weight:500;}
.tag-purple{background:rgba(108,99,255,0.15);color:var(--accent2);}
.tag-green{background:rgba(34,211,165,0.12);color:var(--green);}
.tag-amber{background:rgba(245,158,11,0.12);color:var(--amber);}
.app-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
.app-link{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--accent2);}
.app-link svg{width:13px;height:13px;transition:transform .2s;}
.app-card:hover .app-link svg{transform:translateX(4px);}
body.lang-he .app-card:hover .app-link svg{transform:translateX(-4px);}
.fav-btn{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0;position:relative;z-index:2;}
.fav-btn:hover{background:rgba(245,158,11,0.12);border-color:rgba(245,158,11,0.4);}
.fav-btn.active{background:rgba(245,158,11,0.15);border-color:rgba(245,158,11,0.5);}
.badge-new{position:absolute;top:18px;right:18px;background:var(--green);color:#000;font-size:9px;font-weight:700;padding:3px 8px;border-radius:100px;letter-spacing:.05em;}
body.lang-he .badge-new{right:auto;left:18px;}

/* SUPPORT */
.support-section{background:linear-gradient(135deg,rgba(108,99,255,0.08) 0%,rgba(255,94,91,0.06) 100%);border:0.5px solid var(--border2);border-radius:24px;padding:56px 36px;text-align:center;margin-bottom:72px;position:relative;overflow:hidden;}
.support-section::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:400px;height:300px;background:radial-gradient(ellipse,rgba(255,94,91,0.08) 0%,transparent 70%);}
.support-title{font-family:'Syne',sans-serif;font-size:clamp(20px,4vw,30px);font-weight:800;margin-bottom:12px;position:relative;}
.support-desc{color:var(--text2);max-width:460px;margin:0 auto 28px;font-size:14px;position:relative;}
.kofi-big{display:inline-flex;align-items:center;gap:10px;background:var(--red);border:none;border-radius:100px;padding:14px 28px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;text-decoration:none;font-family:inherit;transition:transform .15s,box-shadow .15s;box-shadow:0 0 30px rgba(255,94,91,0.25);position:relative;}
.kofi-big:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(255,94,91,0.4);}
.kofi-big svg{width:20px;height:20px;}
.support-note{font-size:12px;color:var(--text3);margin-top:14px;}

footer{border-top:0.5px solid var(--border);padding:36px 0;text-align:center;color:var(--text3);font-size:13px;}
footer a{color:var(--text2);text-decoration:none;}
footer a:hover{color:var(--text);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardFadeUp{from{opacity:0;transform:translateY(22px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
#appsGrid .app-card:nth-child(1){animation:cardFadeUp .5s cubic-bezier(.22,.68,0,1.2) .05s both}
#appsGrid .app-card:nth-child(2){animation:cardFadeUp .5s cubic-bezier(.22,.68,0,1.2) .12s both}
#appsGrid .app-card:nth-child(3){animation:cardFadeUp .5s cubic-bezier(.22,.68,0,1.2) .19s both}
#appsGrid .app-card:nth-child(4){animation:cardFadeUp .5s cubic-bezier(.22,.68,0,1.2) .26s both}
@media(max-width:700px){
  .hero{padding:110px 0 50px;}
  .stats{gap:24px;}
  .support-section{padding:36px 20px;}
  nav{padding:12px 16px;}
  .kofi-nav .kofi-text{display:none;}
  .lang-group{gap:1px;}
  .btn-lang{padding:5px 7px;font-size:10px;}
}
</style>
</head>

<script>
// ═══ ЯЗЫК ═══════════════════════════════════════════════
let lang = localStorage.getItem('vart_lang') || 'ru';

function setLang(l) {
  lang = l;
  localStorage.setItem('vart_lang', l);
  document.documentElement.setAttribute('lang', l);

  // RTL для иврита
  const isHe = l === 'he';
  document.documentElement.setAttribute('dir', isHe ? 'rtl' : 'ltr');
  document.body.className = document.body.className.replace(/lang-\w+/, '');
  document.body.classList.add('lang-' + l);

  // Обновляем все data-атрибуты
  document.querySelectorAll('[data-ru],[data-en],[data-he]').forEach(el => {
    const txt = el.getAttribute('data-' + l);
    if (txt !== null) el.textContent = txt;
  });

  // Кнопки языка
  document.querySelectorAll('.btn-lang').forEach(btn => {
    btn.classList.toggle('active',
      (btn.textContent.trim() === 'РУС' && l === 'ru') ||
      (btn.textContent.trim() === 'EN'  && l === 'en') ||
      (btn.textContent.trim() === 'עב'  && l === 'he')
    );
  });

  // Плейсхолдер поиска
  const placeholders = {ru:'Поиск инструментов...', en:'Search tools...', he:'חפש כלים...'};
  document.getElementById('searchInput').placeholder = placeholders[l];

  // Перерисовываем карточки (теги внутри app-card)
  filterApps();
}

// ═══ ТЕМА ═══════════════════════════════════════════════
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('btnTheme').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('vart_theme', isDark ? 'light' : 'dark');
}
function initTheme() {
  const t = localStorage.getItem('vart_theme') || 'dark';
  if (t === 'light') { document.documentElement.setAttribute('data-theme','light'); document.getElementById('btnTheme').textContent = '🌙'; }
  else { document.documentElement.removeAttribute('data-theme'); document.getElementById('btnTheme').textContent = '☀️'; }
}

// ═══ ПОИСК И ФИЛЬТР ═════════════════════════════════════
let activeFilter = 'all';
function setFilter(btn) {
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.cat;
  filterApps();
}
function filterApps() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let visible = 0;
  document.querySelectorAll('#appsGrid .app-card').forEach(c => {
    const matchCat = activeFilter === 'all' || c.dataset.cat === activeFilter;
    const matchQ = !q || c.dataset.name.includes(q) || c.querySelector('.app-name').textContent.toLowerCase().includes(q);
    const show = matchCat && matchQ;
    c.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
}

// ═══ ИЗБРАННОЕ ═══════════════════════════════════════════
function getFavs() { try { return JSON.parse(localStorage.getItem('vart_favs')) || []; } catch { return []; } }
function toggleFav(e, id) {
  e.preventDefault(); e.stopPropagation();
  let favs = getFavs();
  const idx = favs.indexOf(id);
  const btn = e.currentTarget;
  if (idx === -1) { favs.push(id); btn.textContent = '★'; btn.classList.add('active'); }
  else { favs.splice(idx, 1); btn.textContent = '☆'; btn.classList.remove('active'); }
  localStorage.setItem('vart_favs', JSON.stringify(favs));
}
function loadFavs() {
  const favs = getFavs();
  document.querySelectorAll('.fav-btn').forEach(btn => {
    const a = favs.includes(btn.dataset.id);
    btn.textContent = a ? '★' : '☆';
    btn.classList.toggle('active', a);
  });
}

// ═══ INIT ════════════════════════════════════════════════
(function init() {
  initTheme();
  setLang(lang);
  loadFavs();
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
