<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Israel Fit Tracker Pro</title>
    <style>
        /* ОСНОВНОЙ ФОН САЙТА КАК В ПЕРВОМ ПРОЕКТЕ */
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d0f14; /* Глубокий темный фон */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        /* КАРТОЧКА В СТИЛЕ ТВОЕГО СКРИНШОТА */
        .card-container {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(145deg, #1e1e2d, #14141f);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        /* ОРАНЖЕВАЯ МЕТКА "СКОРО" / "LIVE" */
        .badge-status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 165, 0, 0.1);
            color: #ffa500;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* ИКОНКА (Колокольчик на скрине, тут будет яблоко/спорт) */
        .icon-box {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 28px;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        p.description {
            color: #8e8e9e;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* ТЕГИ (Биотех / FDA на скрине) */
        .tags {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tag {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
        }

        /* ФОРМЫ ВНУТРИ КАРТОЧКИ */
        select, input {
            width: 100%;
            background: #252538;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 12px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .btn-main {
            width: 100%;
            background: #6366f1;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main:hover { background: #4f46e5; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .stat-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-item span { display: block; font-size: 12px; color: #8e8e9e; }
        .stat-item strong { font-size: 18px; color: #fff; }

        .kofi-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #8e8e9e;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="card-container">
    <div class="badge-status">Active</div>
    
    <div class="icon-box">🥗</div>

    <h1 id="app-title">Fit Tracker</h1>
    <p class="description" id="app-desc">Подсчет калорий и нутриентов для рынка Израиля. Твой личный помощник в питании.</p>

    <div class="tags">
        <span class="tag">Fitness</span>
        <span class="tag">Israel</span>
        <select id="langSelect" onchange="changeLanguage()" style="width: auto; margin: 0; padding: 2px 8px; font-size: 12px;">
            <option value="ru">RU</option>
            <option value="en">EN</option>
            <option value="he">HE</option>
        </select>
    </div>

    <div class="inputs">
        <select id="food-select"></select>
        <input type="number" id="food-amount" value="100">
        <button class="btn-main" onclick="addFood()" id="btn-add">Добавить данные</button>
    </div>

    <div class="stats-grid">
        <div class="stat-item"><span id="lbl-cal">Ккал</span><strong id="cal-val">0</strong></div>
        <div class="stat-item"><span id="lbl-prot">Белок</span><strong id="prot-val">0</strong></div>
        <div class="stat-item"><span>Zinc</span><strong id="zinc-val">0</strong></div>
        <div class="stat-item"><span>Magnesium</span><strong id="mag-val">0</strong></div>
    </div>

    <a href="https://ko-fi.com/varthur" target="_blank" class="kofi-link">Ko-fi.com/varthur</a>
</div>

<script>
    // Сюда вставь весь JavaScript из предыдущего кода (массив продуктов и функции)
    // Я оставлю только функции сохранения для примера
    const foodDatabase = [
        { id: 1, ru: "Коттедж Tnuva 5%", en: "Cottage Cheese 5%", he: "קוטג' תנובה", cal: 94, prot: 10, zinc: 0.5, mag: 10 },
        { id: 2, ru: "Хумус Цабар", en: "Hummus Tzabar", he: "חומוס צבר", cal: 330, prot: 8, zinc: 1.5, mag: 30 }
    ];

    let dailyData = JSON.parse(localStorage.getItem('fitDaily')) || { cal: 0, prot: 0, zinc: 0, mag: 0 };

    function addFood() {
        const food = foodDatabase.find(f => f.id == document.getElementById('food-select').value);
        const mult = document.getElementById('food-amount').value / 100;
        dailyData.cal += food.cal * mult;
        dailyData.prot += food.prot * mult;
        dailyData.zinc += food.zinc * mult;
        dailyData.mag += food.mag * mult;
        localStorage.setItem('fitDaily', JSON.stringify(dailyData));
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('cal-val').textContent = Math.round(dailyData.cal);
        document.getElementById('prot-val').textContent = Math.round(dailyData.prot);
        document.getElementById('zinc-val').textContent = dailyData.zinc.toFixed(1);
        document.getElementById('mag-val').textContent = Math.round(dailyData.mag);
    }

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
        const select = document.getElementById('food-select');
        select.innerHTML = '';
        foodDatabase.forEach(item => {
            let opt = document.createElement('option');
            opt.value = item.id;
            opt.text = item[lang];
            select.appendChild(opt);
        });
    }

    changeLanguage();
    updateDisplay();
</script>

</body>
</html>
