<meta charset="UTF-8"/>

<title>JobsIL — Работа в Израиле | Jobs in Israel | עבודה בישראל</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07070f;--bg2:#0f0f1c;--bg3:#161625;--bg4:#1e1e2e;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0f0fa;--text2:#7070a0;--text3:#363655;--accent:#4f6ef7;--accent2:#7b93ff;--green:#00e5a0;--amber:#ffb800;--red:#ff4d6d;--purple:#a78bfa;}
[data-theme="light"]{--bg:#f4f4fb;--bg2:#fff;--bg3:#eeeef7;--bg4:#e5e5f0;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#12121f;--text2:#55557a;--text3:#aaaacc;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden;transition:background .3s,color .3s;}

.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 600px 400px at 15% 15%,rgba(79,110,247,0.07) 0%,transparent 60%),radial-gradient(ellipse 500px 400px at 85% 85%,rgba(0,229,160,0.05) 0%,transparent 60%);}
.bg-dots{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:28px 28px;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:62px;background:rgba(7,7,15,0.92);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:12px;}
[data-theme="light"] nav{background:rgba(244,244,251,0.95);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.nav-logo-badge{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#6c8fff);display:flex;align-items:center;justify-content:center;font-size:18px;}
.nav-logo-text{font-size:20px;font-weight:800;letter-spacing:-0.03em;color:var(--text);}
.nav-logo-text span{color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto;}

/* Lang group */
.lang-group{display:flex;background:var(--bg3);border:0.5px solid var(--border2);border-radius:100px;padding:3px;gap:2px;}
.btn-lang{background:transparent;border:none;border-radius:100px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;font-family:'Heebo',sans-serif;transition:all .15s;white-space:nowrap;}
.btn-lang.active{background:var(--accent);color:#fff;}
.btn-lang:hover:not(.active){color:var(--text);}
.btn-theme{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s;}

/* HERO */
.hero{padding:100px 24px 44px;text-align:center;position:relative;z-index:1;}
.hero-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(79,110,247,0.1);border:0.5px solid rgba(79,110,247,0.25);border-radius:100px;padding:5px 16px;font-size:12px;font-weight:600;color:var(--accent2);margin-bottom:20px;}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
.hero h1{font-size:clamp(28px,5vw,52px);font-weight:900;letter-spacing:-0.03em;line-height:1.05;margin-bottom:10px;}
.hero h1 em{font-style:normal;color:var(--accent);}
.hero-sub{font-size:15px;color:var(--text2);max-width:520px;margin:0 auto 24px;}

/* SEARCH */
.search-wrap{max-width:540px;margin:0 auto 36px;position:relative;}
.search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:14px 20px 14px 48px;font-size:15px;color:var(--text);font-family:'Heebo',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,110,247,0.12);}
.search-wrap input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
[dir="rtl"] .search-wrap input{padding:14px 48px 14px 20px;}
[dir="rtl"] .search-icon{left:auto;right:16px;}

/* STATS */
.hero-stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;margin-bottom:0;}
.h-stat-n{font-size:26px;font-weight:800;display:block;letter-spacing:-0.02em;}
.h-stat-l{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;}

/* FILTERS */
.sticky-bar{position:sticky;top:62px;z-index:90;background:rgba(7,7,15,0.96);backdrop-filter:blur(16px);border-bottom:0.5px solid var(--border);}
[data-theme="light"] .sticky-bar{background:rgba(244,244,251,0.97);}
.filters-inner{max-width:1200px;margin:0 auto;padding:12px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.f-chip{display:flex;align-items:center;gap:5px;background:var(--bg3);border:0.5px solid var(--border);border-radius:100px;padding:7px 14px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Heebo',sans-serif;}
.f-chip:hover{border-color:var(--border2);color:var(--text);}
.f-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:36px 24px;position:relative;z-index:1;}
.section-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.section-label::after{content:'';flex:1;height:0.5px;background:var(--border);}

/* SITES GRID */
.sites-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:48px;}
.site-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:22px 20px;display:flex;flex-direction:column;gap:14px;transition:transform .2s,border-color .2s,box-shadow .2s;animation:cardIn .4s ease both;}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.site-card:hover{transform:translateY(-4px);border-color:var(--border2);box-shadow:0 18px 40px rgba(0,0,0,0.35);}
.site-card-head{display:flex;align-items:center;gap:12px;}
.site-logo{width:48px;height:48px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;border:0.5px solid var(--border);}
.site-name{font-size:16px;font-weight:800;color:var(--text);line-height:1.2;}
.site-domain{font-size:11px;color:var(--text3);margin-top:2px;}
.site-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:100px;}
.tag-blue{background:rgba(79,110,247,0.12);color:var(--accent2);}
.tag-green{background:rgba(0,229,160,0.1);color:var(--green);}
.tag-amber{background:rgba(255,184,0,0.1);color:var(--amber);}
.tag-purple{background:rgba(167,139,250,0.1);color:var(--purple);}
.tag-red{background:rgba(255,77,109,0.12);color:var(--red);}
.site-desc{font-size:13px;color:var(--text2);line-height:1.55;flex:1;}
.site-actions{display:flex;flex-direction:column;gap:8px;margin-top:auto;}
.btn-goto{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--accent);color:#fff;border:none;border-radius:100px;padding:11px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;text-decoration:none;transition:opacity .15s,transform .15s;}
.btn-goto:hover{opacity:.88;transform:translateY(-1px);}
.btn-search{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2);border-radius:100px;padding:9px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;text-decoration:none;transition:all .15s;}
.btn-search:hover{color:var(--text);border-color:var(--accent);}

/* TIPS */
.tips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:48px;}
.tip-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:18px;display:flex;gap:14px;}
.tip-icon{font-size:26px;flex-shrink:0;line-height:1;}
.tip-title{font-size:14px;font-weight:700;margin-bottom:4px;}
.tip-text{font-size:12px;color:var(--text2);line-height:1.55;}

/* DONATE */
.donate-banner{background:linear-gradient(135deg,rgba(79,110,247,0.12),rgba(0,229,160,0.08));border:0.5px solid rgba(79,110,247,0.2);border-radius:18px;padding:28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:48px;}
.donate-text{flex:1;min-width:200px;}
.donate-text h3{font-size:18px;font-weight:800;margin-bottom:6px;}
.donate-text p{font-size:13px;color:var(--text2);}
.btn-donate{background:var(--amber);color:#000;border:none;border-radius:100px;padding:12px 24px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Heebo',sans-serif;text-decoration:none;flex-shrink:0;transition:opacity .15s,transform .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-donate:hover{opacity:.88;transform:translateY(-1px);}

/* NO RESULTS */
.no-results{text-align:center;padding:60px 20px;display:none;}

footer{border-top:0.5px solid var(--border);padding:28px 24px;text-align:center;color:var(--text3);font-size:12px;position:relative;z-index:1;}
footer a{color:var(--text2);text-decoration:none;}

@media(max-width:640px){
  .hero h1{font-size:28px;}
  .main{padding:20px 14px;}
  .sites-grid{grid-template-columns:1fr;}
  nav{padding:0 14px;}
  .filters-inner{padding:10px 14px;}
  .donate-banner{padding:20px;}
  .lang-group{gap:1px;}
  .btn-lang{padding:5px 7px;font-size:10px;}
}
</style>
</head>

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let lang = 'ru';
let activeCat = 'all';
let searchQ = '';

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderAll() {
  const t = TR[lang];

  // Hero
  document.getElementById('heroBadge').textContent = t.badge;
  document.getElementById('heroTitle').innerHTML = t.title;
  document.getElementById('heroSub').textContent = t.sub;
  document.getElementById('searchInput').placeholder = t.searchPh;
  document.getElementById('statSites').textContent = t.statSites;
  document.getElementById('statCats').textContent = t.statCats;
  document.getElementById('statJobs').textContent = t.statJobs;
  document.getElementById('sectionLabel').textContent = t.sectionLabel;
  document.getElementById('tipsLabel').textContent = t.tipsLabel;
  document.getElementById('noResultsText').textContent = t.noResults;
  document.getElementById('donateTitle').textContent = t.donateTitle;
  document.getElementById('donateDesc').textContent = t.donateDesc;

  // Filters
  const filterKeys = ['all','security','construction','it','medical','trade','warehouse','cleaning','driver','food','remote'];
  document.getElementById('filtersInner').innerHTML = filterKeys.map(k => {
    const label = k === 'all' ? t.filterAll : (t.filters[k] || k);
    return `<button class="f-chip${activeCat===k?' active':''}" data-val="${k}" onclick="setFilter(this)">${label}</button>`;
  }).join('');

  // Tips
  document.getElementById('tipsGrid').innerHTML = t.tips.map(tip => `
    <div class="tip-card">
      <div class="tip-icon">${tip.icon}</div>
      <div><div class="tip-title">${tip.title}</div><div class="tip-text">${tip.text}</div></div>
    </div>`).join('');

  // Sites
  renderSites();
}

function renderSites() {
  const t = TR[lang];
  const grid = document.getElementById('sitesGrid');
  const no = document.getElementById('noResults');

  const filtered = SITES.filter(s => {
    const matchCat = activeCat === 'all' || s.cats.includes(activeCat);
    const allText = (s.name + Object.values(s.desc).join(' ')).toLowerCase();
    const matchQ = !searchQ || allText.includes(searchQ);
    return matchCat && matchQ;
  });

  if (!filtered.length) {
    grid.innerHTML = '';
    no.style.display = 'block';
    return;
  }
  no.style.display = 'none';

  grid.innerHTML = filtered.map((s, i) => {
    const desc = s.desc[lang] || s.desc.ru;
    const targetUrl = (activeCat !== 'all' && s.catUrls[activeCat]) ? s.catUrls[activeCat] : s.baseUrl;
    const hasFilter = activeCat !== 'all' && s.catUrls[activeCat];
    const isRemote = s.cats.includes('remote') && activeCat !== 'remote';

    return `
    <div class="site-card" style="animation-delay:${i*0.06}s">
      <div class="site-card-head">
        <div class="site-logo">${s.emoji}</div>
        <div>
          <div class="site-name">${s.name}</div>
          <div class="site-domain">${s.domain}</div>
        </div>
      </div>
      <div class="site-tags">
        <span class="tag tag-${s.tagKey}">${s.tagLabel[lang]}</span>
        ${isRemote ? `<span class="tag tag-green">${t.remote}</span>` : ''}
      </div>
      <div class="site-desc">${desc}</div>
      <div class="site-actions">
        <a href="${targetUrl}" target="_blank" rel="noopener" class="btn-goto">${t.gotoBtn}</a>
        ${hasFilter ? `<a href="${targetUrl}" target="_blank" rel="noopener" class="btn-search">${t.searchBtn}</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// LANG
// ═══════════════════════════════════════════════
function setLang(l) {
  lang = l;
  localStorage.setItem('jobsil_lang', l);
  const isHe = l === 'he';
  document.documentElement.setAttribute('lang', l);
  document.documentElement.setAttribute('dir', isHe ? 'rtl' : 'ltr');
  ['ru','en','he'].forEach(code => {
    const btn = document.getElementById('btn' + code.charAt(0).toUpperCase() + code.slice(1));
    if (btn) btn.classList.toggle('active', code === l);
  });
  renderAll();
}

// ═══════════════════════════════════════════════
// FILTER & SEARCH
// ═══════════════════════════════════════════════
function filterSites() {
  searchQ = document.getElementById('searchInput').value.toLowerCase();
  renderSites();
}

function setFilter(btn) {
  activeCat = btn.dataset.val;
  renderAll();
}

// ═══════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════
function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('btnTheme').textContent = next === 'light' ? '🌙' : '☀️';
  localStorage.setItem('jobsil_theme', next);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
(function init() {
  const t = localStorage.getItem('jobsil_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('btnTheme').textContent = t === 'light' ? '🌙' : '☀️';
  setLang(localStorage.getItem('jobsil_lang') || 'ru');
})();
</script>
