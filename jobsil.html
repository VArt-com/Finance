<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JobsIL — Работа в Израиле | Jobs in Israel | עבודה בישראל</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07070f;--bg2:#0f0f1c;--bg3:#161625;--bg4:#1e1e2e;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0f0fa;--text2:#7070a0;--text3:#363655;--accent:#4f6ef7;--accent2:#7b93ff;--green:#00e5a0;--amber:#ffb800;--red:#ff4d6d;--purple:#a78bfa;}
[data-theme="light"]{--bg:#f4f4fb;--bg2:#fff;--bg3:#eeeef7;--bg4:#e5e5f0;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#12121f;--text2:#55557a;--text3:#aaaacc;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden;transition:background .3s,color .3s;}

.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 600px 400px at 15% 15%,rgba(79,110,247,0.07) 0%,transparent 60%),radial-gradient(ellipse 500px 400px at 85% 85%,rgba(0,229,160,0.05) 0%,transparent 60%);}
.bg-dots{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:28px 28px;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:62px;background:rgba(7,7,15,0.92);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:12px;}
[data-theme="light"] nav{background:rgba(244,244,251,0.95);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.nav-logo-badge{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#6c8fff);display:flex;align-items:center;justify-content:center;font-size:18px;}
.nav-logo-text{font-size:20px;font-weight:800;letter-spacing:-0.03em;color:var(--text);}
.nav-logo-text span{color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto;}

/* Lang group */
.lang-group{display:flex;background:var(--bg3);border:0.5px solid var(--border2);border-radius:100px;padding:3px;gap:2px;}
.btn-lang{background:transparent;border:none;border-radius:100px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;font-family:'Heebo',sans-serif;transition:all .15s;white-space:nowrap;}
.btn-lang.active{background:var(--accent);color:#fff;}
.btn-lang:hover:not(.active){color:var(--text);}
.btn-theme{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s;}

/* HERO */
.hero{padding:100px 24px 44px;text-align:center;position:relative;z-index:1;}
.hero-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(79,110,247,0.1);border:0.5px solid rgba(79,110,247,0.25);border-radius:100px;padding:5px 16px;font-size:12px;font-weight:600;color:var(--accent2);margin-bottom:20px;}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
.hero h1{font-size:clamp(28px,5vw,52px);font-weight:900;letter-spacing:-0.03em;line-height:1.05;margin-bottom:10px;}
.hero h1 em{font-style:normal;color:var(--accent);}
.hero-sub{font-size:15px;color:var(--text2);max-width:520px;margin:0 auto 24px;}

/* SEARCH */
.search-wrap{max-width:540px;margin:0 auto 36px;position:relative;}
.search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:14px 20px 14px 48px;font-size:15px;color:var(--text);font-family:'Heebo',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,110,247,0.12);}
.search-wrap input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
[dir="rtl"] .search-wrap input{padding:14px 48px 14px 20px;}
[dir="rtl"] .search-icon{left:auto;right:16px;}

/* STATS */
.hero-stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;margin-bottom:0;}
.h-stat-n{font-size:26px;font-weight:800;display:block;letter-spacing:-0.02em;}
.h-stat-l{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;}

/* FILTERS */
.sticky-bar{position:sticky;top:62px;z-index:90;background:rgba(7,7,15,0.96);backdrop-filter:blur(16px);border-bottom:0.5px solid var(--border);}
[data-theme="light"] .sticky-bar{background:rgba(244,244,251,0.97);}
.filters-inner{max-width:1200px;margin:0 auto;padding:12px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.f-chip{display:flex;align-items:center;gap:5px;background:var(--bg3);border:0.5px solid var(--border);border-radius:100px;padding:7px 14px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Heebo',sans-serif;}
.f-chip:hover{border-color:var(--border2);color:var(--text);}
.f-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:36px 24px;position:relative;z-index:1;}
.section-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.section-label::after{content:'';flex:1;height:0.5px;background:var(--border);}

/* SITES GRID */
.sites-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:48px;}
.site-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:22px 20px;display:flex;flex-direction:column;gap:14px;transition:transform .2s,border-color .2s,box-shadow .2s;animation:cardIn .4s ease both;}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.site-card:hover{transform:translateY(-4px);border-color:var(--border2);box-shadow:0 18px 40px rgba(0,0,0,0.35);}
.site-card-head{display:flex;align-items:center;gap:12px;}
.site-logo{width:48px;height:48px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;border:0.5px solid var(--border);}
.site-name{font-size:16px;font-weight:800;color:var(--text);line-height:1.2;}
.site-domain{font-size:11px;color:var(--text3);margin-top:2px;}
.site-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:100px;}
.tag-blue{background:rgba(79,110,247,0.12);color:var(--accent2);}
.tag-green{background:rgba(0,229,160,0.1);color:var(--green);}
.tag-amber{background:rgba(255,184,0,0.1);color:var(--amber);}
.tag-purple{background:rgba(167,139,250,0.1);color:var(--purple);}
.tag-red{background:rgba(255,77,109,0.12);color:var(--red);}
.site-desc{font-size:13px;color:var(--text2);line-height:1.55;flex:1;}
.site-actions{display:flex;flex-direction:column;gap:8px;margin-top:auto;}
.btn-goto{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--accent);color:#fff;border:none;border-radius:100px;padding:11px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;text-decoration:none;transition:opacity .15s,transform .15s;}
.btn-goto:hover{opacity:.88;transform:translateY(-1px);}
.btn-search{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2);border-radius:100px;padding:9px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;text-decoration:none;transition:all .15s;}
.btn-search:hover{color:var(--text);border-color:var(--accent);}

/* TIPS */
.tips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:48px;}
.tip-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:18px;display:flex;gap:14px;}
.tip-icon{font-size:26px;flex-shrink:0;line-height:1;}
.tip-title{font-size:14px;font-weight:700;margin-bottom:4px;}
.tip-text{font-size:12px;color:var(--text2);line-height:1.55;}

/* DONATE */
.donate-banner{background:linear-gradient(135deg,rgba(79,110,247,0.12),rgba(0,229,160,0.08));border:0.5px solid rgba(79,110,247,0.2);border-radius:18px;padding:28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:48px;}
.donate-text{flex:1;min-width:200px;}
.donate-text h3{font-size:18px;font-weight:800;margin-bottom:6px;}
.donate-text p{font-size:13px;color:var(--text2);}
.btn-donate{background:var(--amber);color:#000;border:none;border-radius:100px;padding:12px 24px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Heebo',sans-serif;text-decoration:none;flex-shrink:0;transition:opacity .15s,transform .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-donate:hover{opacity:.88;transform:translateY(-1px);}

/* NO RESULTS */
.no-results{text-align:center;padding:60px 20px;display:none;}

/* POST BUTTONS */
.btn-post-job{display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:100px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;transition:opacity .15s;}
.btn-post-job:hover{opacity:.85;}
.btn-post-cv{display:flex;align-items:center;gap:6px;background:var(--green);color:#000;border:none;border-radius:100px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;transition:opacity .15s;}
.btn-post-cv:hover{opacity:.85;}

/* MODAL OVERLAY */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:22px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;position:relative;}
.modal-close{position:absolute;top:16px;right:16px;background:var(--bg3);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;}
.modal-title{font-size:20px;font-weight:800;margin-bottom:4px;color:var(--text);}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.full{grid-template-columns:1fr;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:12px;font-weight:600;color:var(--text2);}
.form-field input,.form-field select,.form-field textarea{background:var(--bg3);border:0.5px solid var(--border2);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'Heebo',sans-serif;outline:none;transition:border-color .2s;}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--accent);}
.form-field textarea{resize:vertical;min-height:70px;}
.form-field select{cursor:pointer;}
.salary-row{display:flex;align-items:center;gap:8px;}
.salary-row span{color:var(--text3);font-size:13px;}
.salary-row input{flex:1;}
.form-btns{display:flex;gap:10px;margin-top:18px;}
.btn-cancel{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:100px;padding:11px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;font-family:'Heebo',sans-serif;}
.btn-submit-job{flex:2;background:var(--accent);color:#fff;border:none;border-radius:100px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;}
.btn-submit-cv{flex:2;background:var(--green);color:#000;border:none;border-radius:100px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;}

/* USER POSTS GRID */
.user-posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:36px;}
.ucard{background:var(--bg2);border:0.5px solid var(--border);border-radius:18px;padding:18px;display:flex;flex-direction:column;gap:10px;transition:transform .2s,border-color .2s;}
.ucard:hover{transform:translateY(-3px);border-color:var(--border2);}
.ucard.job-card{border-left:3px solid var(--accent);}
.ucard.cv-card{border-left:3px solid var(--green);}
.ucard-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.ucard-emoji{font-size:28px;line-height:1;}
.ucard-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:100px;}
.badge-job{background:rgba(79,110,247,0.12);color:var(--accent2);}
.badge-cv{background:rgba(0,229,160,0.1);color:var(--green);}
.ucard-title{font-size:15px;font-weight:700;color:var(--text);}
.ucard-company{font-size:12px;color:var(--text2);margin-top:2px;}
.ucard-tags{display:flex;gap:5px;flex-wrap:wrap;}
.utag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border);}
.ucard-salary{font-size:14px;font-weight:700;color:var(--green);}
.ucard-desc{font-size:12px;color:var(--text2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.ucard-contact{display:flex;gap:8px;margin-top:auto;}
.btn-contact{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;border-radius:100px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;text-decoration:none;transition:opacity .15s;}
.btn-wa{background:rgba(0,229,160,0.1);color:var(--green);border:0.5px solid rgba(0,229,160,0.3);}
.btn-em{background:rgba(79,110,247,0.1);color:var(--accent2);border:0.5px solid rgba(79,110,247,0.3);}
.btn-wa:hover,.btn-em:hover{opacity:.75;}
.empty-posts{text-align:center;padding:32px 20px;color:var(--text3);font-size:13px;background:var(--bg2);border:0.5px dashed var(--border2);border-radius:16px;margin-bottom:36px;}
.empty-posts span{font-size:32px;display:block;margin-bottom:8px;}
.post-actions-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}

footer{border-top:0.5px solid var(--border);padding:28px 24px;text-align:center;color:var(--text3);font-size:12px;position:relative;z-index:1;}
footer a{color:var(--text2);text-decoration:none;}

@media(max-width:640px){
  .hero h1{font-size:28px;}
  .main{padding:20px 14px;}
  .sites-grid,.user-posts-grid{grid-template-columns:1fr;}
  nav{padding:0 14px;}
  .filters-inner{padding:10px 14px;}
  .donate-banner{padding:20px;}
  .lang-group{gap:1px;}
  .btn-lang{padding:5px 7px;font-size:10px;}
  .form-row{grid-template-columns:1fr;}
  .modal-box{padding:20px;}
}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4502841289225255" crossorigin="anonymous"></script>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-dots"></div>

<nav>
  <a href="#" class="nav-logo">
    <div class="nav-logo-badge">💼</div>
    <div class="nav-logo-text">Jobs<span>IL</span></div>
  </a>
  <div class="nav-right">
    <div class="lang-group">
      <button class="btn-lang active" id="btnRu" data-lang="ru">РУС</button>
      <button class="btn-lang" id="btnEn" data-lang="en">EN</button>
      <button class="btn-lang" id="btnHe" data-lang="he">עב</button>
    </div>
    <button class="btn-theme" id="btnTheme">🌙</button>
    <button class="btn-post-job" id="navBtnJob">💼 <span id="navBtnJobTxt">Вакансию</span></button>
    <button class="btn-post-cv" id="navBtnCv">📄 <span id="navBtnCvTxt">Резюме</span></button>
  </div>
</nav>

<section class="hero">
  <div class="hero-badge" id="heroBadge">🇮🇱</div>
  <h1 id="heroTitle"></h1>
  <p class="hero-sub" id="heroSub"></p>
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input id="searchInput" type="text" oninput="filterSites()"/>
  </div>
  <div class="hero-stats">
    <div class="h-stat"><span class="h-stat-n">6</span><span class="h-stat-l" id="statSites"></span></div>
    <div class="h-stat"><span class="h-stat-n">10</span><span class="h-stat-l" id="statCats"></span></div>
    <div class="h-stat"><span class="h-stat-n">100K+</span><span class="h-stat-l" id="statJobs"></span></div>
  </div>
</section>

<div class="sticky-bar">
  <div class="filters-inner" id="filtersInner"></div>
</div>

<main class="main">
  <div class="section-label" id="sectionLabel"></div>
  <div class="sites-grid" id="sitesGrid"></div>
  <div class="no-results" id="noResults">
    <div style="font-size:44px;margin-bottom:14px">🔍</div>
    <h3 id="noResultsText"></h3>
  </div>

  <div class="section-label" id="tipsLabel" style="margin-top:12px"></div>
  <div class="tips-grid" id="tipsGrid"></div>

  <!-- USER POSTS SECTION -->
  <div id="userPostsSection">
    <div class="section-label" id="jobPostsLabel" style="margin-top:12px"></div>
    <div class="post-actions-row">
      <button class="btn-post-job" id="secBtnJob">💼 <span id="secBtnJobTxt">Разместить вакансию</span></button>
      <button class="btn-post-cv" id="secBtnCv">📄 <span id="secBtnCvTxt">Добавить резюме</span></button>
    </div>
    <div id="jobPostsGrid"></div>
    <div class="section-label" id="cvPostsLabel" style="margin-top:12px"></div>
    <div id="cvPostsGrid"></div>
  </div>

  <div class="donate-banner">
    <div style="font-size:42px;flex-shrink:0">☕</div>
    <div class="donate-text">
      <h3 id="donateTitle"></h3>
      <p id="donateDesc"></p>
    </div>
    <a href="https://ko-fi.com/varthur" target="_blank" rel="noopener" class="btn-donate">☕ Ko-fi</a>
  </div>
</main>

<!-- MODAL JOB -->
<div class="modal-overlay" id="modalJob">
  <div class="modal-box">
    <button class="modal-close" data-close="job">✕</button>
    <div class="modal-title" id="mJobTitle">💼 Разместить вакансию</div>
    <div class="modal-sub" id="mJobSub">Бесплатно · Без регистрации · Сразу видно всем</div>
    <div class="form-row">
      <div class="form-field" style="grid-column:1/-1">
        <label class="form-label" id="mJobLblTitle">Название должности *</label>
        <input type="text" id="jTitle" placeholder="Охранник, Повар, Программист..."/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label" id="mJobLblCat">Категория *</label>
        <select id="jCat">
          <option value="security">🛡 Охрана</option>
          <option value="construction">🏗 Строительство</option>
          <option value="it">💻 IT</option>
          <option value="medical">⚕️ Медицина</option>
          <option value="trade">🛍 Торговля</option>
          <option value="warehouse">📦 Склад</option>
          <option value="cleaning">🧹 Уборка</option>
          <option value="driver">🚗 Водители</option>
          <option value="food">🍽 Общепит</option>
          <option value="remote">🌐 Удалённо</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label" id="mJobLblCity">Город *</label>
        <input type="text" id="jCity" placeholder="Тель-Авив, Хайфа..."/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label" id="mJobLblSalary">Зарплата ₪/мес</label>
        <div class="salary-row">
          <input type="number" id="jSalFrom" placeholder="от" min="0"/>
          <span>–</span>
          <input type="number" id="jSalTo" placeholder="до" min="0"/>
        </div>

function renderAll() {
  const t = TR[lang];

  // Hero
  document.getElementById('heroBadge').textContent = t.badge;
  document.getElementById('heroTitle').innerHTML = t.title;
  document.getElementById('heroSub').textContent = t.sub;
  document.getElementById('searchInput').placeholder = t.searchPh;
  document.getElementById('statSites').textContent = t.statSites;
  document.getElementById('statCats').textContent = t.statCats;
  document.getElementById('statJobs').textContent = t.statJobs;
  document.getElementById('sectionLabel').textContent = t.sectionLabel;
  document.getElementById('tipsLabel').textContent = t.tipsLabel;
  document.getElementById('noResultsText').textContent = t.noResults;
  document.getElementById('donateTitle').textContent = t.donateTitle;
  document.getElementById('donateDesc').textContent = t.donateDesc;

  // Filters
  const filterKeys = ['all','security','construction','it','medical','trade','warehouse','cleaning','driver','food','remote'];
  document.getElementById('filtersInner').innerHTML = filterKeys.map(k => {
    const label = k === 'all' ? t.filterAll : (t.filters[k] || k);
    return `<button class="f-chip${activeCat===k?' active':''}" data-val="${k}" onclick="setFilter(this)">${label}</button>`;
  }).join('');

  // Tips
  document.getElementById('tipsGrid').innerHTML = t.tips.map(tip => `
    <div class="tip-card">
      <div class="tip-icon">${tip.icon}</div>
      <div><div class="tip-title">${tip.title}</div><div class="tip-text">${tip.text}</div></div>
    </div>`).join('');

  // Sites
  renderSites();
}

function renderSites() {
  const t = TR[lang];
  const grid = document.getElementById('sitesGrid');
  const no = document.getElementById('noResults');

  const filtered = SITES.filter(s => {
    const matchCat = activeCat === 'all' || s.cats.includes(activeCat);
    const allText = (s.name + Object.values(s.desc).join(' ')).toLowerCase();
    const matchQ = !searchQ || allText.includes(searchQ);
    return matchCat && matchQ;
  });

  if (!filtered.length) {
    grid.innerHTML = '';
    no.style.display = 'block';
    return;
  }
  no.style.display = 'none';

  grid.innerHTML = filtered.map((s, i) => {
    const desc = s.desc[lang] || s.desc.ru;
    const targetUrl = (activeCat !== 'all' && s.catUrls[activeCat]) ? s.catUrls[activeCat] : s.baseUrl;
    const hasFilter = activeCat !== 'all' && s.catUrls[activeCat];
    const isRemote = s.cats.includes('remote') && activeCat !== 'remote';

    return `
    <div class="site-card" style="animation-delay:${i*0.06}s">
      <div class="site-card-head">
        <div class="site-logo">${s.emoji}</div>
        <div>
          <div class="site-name">${s.name}</div>
          <div class="site-domain">${s.domain}</div>
        </div>
      </div>
      <div class="site-tags">
        <span class="tag tag-${s.tagKey}">${s.tagLabel[lang]}</span>
        ${isRemote ? `<span class="tag tag-green">${t.remote}</span>` : ''}
      </div>
      <div class="site-desc">${desc}</div>
      <div class="site-actions">
        <a href="${targetUrl}" target="_blank" rel="noopener" class="btn-goto">${t.gotoBtn}</a>
        ${hasFilter ? `<a href="${targetUrl}" target="_blank" rel="noopener" class="btn-search">${t.searchBtn}</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

function setLang(l) {
  lang = l;
  localStorage.setItem('jobsil_lang', l);
  const isHe = l === 'he';
  document.documentElement.setAttribute('lang', l);
  document.documentElement.setAttribute('dir', isHe ? 'rtl' : 'ltr');
  ['ru','en','he'].forEach(code => {
    const btn = document.getElementById('btn' + code.charAt(0).toUpperCase() + code.slice(1));
    if (btn) btn.classList.toggle('active', code === l);
  });
  renderAll();
  renderUserPosts();
}

function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('btnTheme').textContent = next === 'light' ? '🌙' : '☀️';
  localStorage.setItem('jobsil_theme', next);
}

// Real-time listeners
let fbJobs = [];
let fbCvs = [];

function startListeners() {
  const jobsQ = query(collection(db, 'jobs'), orderBy('createdAt', 'desc'));
  onSnapshot(jobsQ, snap => {
    fbJobs = snap.docs.map(d => ({id: d.id, ...d.data()}));
    renderUserPosts();
  });
  const cvsQ = query(collection(db, 'cvs'), orderBy('createdAt', 'desc'));
  onSnapshot(cvsQ, snap => {
    fbCvs = snap.docs.map(d => ({id: d.id, ...d.data()}));
    renderUserPosts();
  });
}

// MODAL LOGIC
// ═══════════════════════════════════════════════
function openModal(type){
  document.getElementById(type==='job'?'modalJob':'modalCv').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(type){
  document.getElementById(type==='job'?'modalJob':'modalCv').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('modal-overlay')) closeModal(e.target.id==='modalJob'?'job':'cv');
});

// SUBMIT JOB
// ═══════════════════════════════════════════════
async function submitJob(){
  const title=document.getElementById('jTitle').value.trim();
  const city=document.getElementById('jCity').value.trim();
  const contact=document.getElementById('jContact').value.trim();
  if(!title||!city||!contact){alert(PTR[lang].errRequired);return;}
  const btn=document.getElementById('mJobSubmit');
  btn.disabled=true; btn.textContent='...';
  try{
    await addDoc(collection(db,'jobs'),{
      title, cat:document.getElementById('jCat').value,
      city, company:document.getElementById('jCompany').value.trim(),
      salFrom:document.getElementById('jSalFrom').value||'',
      salTo:document.getElementById('jSalTo').value||'',
      skills:document.getElementById('jSkills').value.trim(),
      desc:document.getElementById('jDesc').value.trim(),
      contact, contactType:document.getElementById('jContactType').value,
      createdAt:serverTimestamp()
    });
    ['jTitle','jCity','jCompany','jSalFrom','jSalTo','jSkills','jDesc','jContact'].forEach(id=>document.getElementById(id).value='');
    closeModal('job');
  }catch(e){alert('Ошибка: '+e.message);}
  btn.disabled=false; btn.textContent=PTR[lang].mJobSubmit||'Опубликовать →';
}

// RENDER USER POSTS
// ═══════════════════════════════════════════════
function renderUserPosts(){
  const p=PTR[lang];
  const jobs=fbJobs||[];
  const cvs=fbCvs||[];

  document.getElementById('jobPostsLabel').textContent=p.jobPostsLabel;
  document.getElementById('cvPostsLabel').textContent=p.cvPostsLabel;
  document.getElementById('secBtnJobTxt').textContent=p.secBtnJob;
  document.getElementById('secBtnCvTxt').textContent=p.secBtnCv;
  document.getElementById('navBtnJobTxt').textContent=p.navJob;
  document.getElementById('navBtnCvTxt').textContent=p.navCv;

  // Update modal labels
  const mlabels=['mJobTitle','mJobSub','mJobLblTitle','mJobLblCat','mJobLblCity','mJobLblSalary',
    'mJobLblCompany','mJobLblSkills','mJobLblDesc','mJobLblContact','mJobLblContactType',
    'mJobCancel','mJobSubmit','mCvTitle','mCvSub','mCvLblName','mCvLblProf','mCvLblCat',
    'mCvLblCity','mCvLblExp','mCvLblSalary','mCvLblSkills','mCvLblAbout',
    'mCvLblContact','mCvLblContactType','mCvCancel','mCvSubmit'];
  mlabels.forEach(id=>{const el=document.getElementById(id);if(el&&p[id])el.textContent=p[id];});

  // Render jobs grid
  const jGrid=document.getElementById('jobPostsGrid');
  if(!jobs.length){
    jGrid.innerHTML=`<div class="empty-posts"><span>💼</span>${p.emptyJobs}</div>`;
  } else {
    jGrid.innerHTML=`<div class="user-posts-grid">${jobs.map(j=>renderJobCard(j,p)).join('')}</div>`;
  }

  // Render CVs grid
  const cGrid=document.getElementById('cvPostsGrid');
  if(!cvs.length){
    cGrid.innerHTML=`<div class="empty-posts"><span>📄</span>${p.emptyCvs}</div>`;
  } else {
    cGrid.innerHTML=`<div class="user-posts-grid">${cvs.map(c=>renderCvCard(c,p)).join('')}</div>`;
  }
}

function renderJobCard(j,p){
  const emoji=p.catEmojis[j.cat]||'💼';
  const catLabel=p.catLabels[j.cat]||j.cat;
  let salary='';
  if(j.salFrom&&j.salTo) salary=`<div class="ucard-salary">₪${Number(j.salFrom).toLocaleString()} – ₪${Number(j.salTo).toLocaleString()}</div>`;
  else if(j.salFrom) salary=`<div class="ucard-salary">${p.salaryFrom}${Number(j.salFrom).toLocaleString()}</div>`;
  const contactBtn=j.contactType==='wa'
    ?`<a class="btn-contact btn-wa" href="https://wa.me/${j.contact.replace(/\D/g,'')}" target="_blank">📱 ${p.contactWa}</a>`
    :`<a class="btn-contact btn-em" href="mailto:${j.contact}" target="_blank">✉️ ${p.contactEmail}</a>`;
  return `<div class="ucard job-card">
    <div class="ucard-head"><div class="ucard-emoji">${emoji}</div><span class="ucard-badge badge-job">${p.badgeJob}</span></div>
    <div><div class="ucard-title">${j.title}</div>${j.company?`<div class="ucard-company">${j.company}</div>`:''}</div>
    <div class="ucard-tags"><span class="utag">${catLabel}</span><span class="utag">📍${j.city}</span>${j.date?`<span class="utag">${j.date}</span>`:''}</div>
    ${salary}
    ${j.skills?`<div class="ucard-desc"><b>${p.skillsLabel}</b> ${j.skills}</div>`:''}
    ${j.desc?`<div class="ucard-desc">${j.desc}</div>`:''}
    <div class="ucard-contact">${contactBtn}</div>
  </div>`;
}

function renderCvCard(c,p){
  const emoji=p.catEmojis[c.cat]||'👤';
  const catLabel=p.catLabels[c.cat]||c.cat;
  let salary=c.salary?`<div class="ucard-salary">${p.salaryDesired}${Number(c.salary).toLocaleString()}</div>`:'';
  const contactBtn=c.contactType==='wa'
    ?`<a class="btn-contact btn-wa" href="https://wa.me/${c.contact.replace(/\D/g,'')}" target="_blank">📱 ${p.contactWa}</a>`
    :`<a class="btn-contact btn-em" href="mailto:${c.contact}" target="_blank">✉️ ${p.contactEmail}</a>`;
  return `<div class="ucard cv-card">
    <div class="ucard-head"><div class="ucard-emoji">${emoji}</div><span class="ucard-badge badge-cv">${p.badgeCv}</span></div>
    <div><div class="ucard-title">${c.name}</div><div class="ucard-company">${c.prof}</div></div>
    <div class="ucard-tags"><span class="utag">${catLabel}</span><span class="utag">📍${c.city}</span>${c.exp?`<span class="utag">${p.expLabel} ${c.exp}</span>`:''}</div>
    ${salary}
    ${c.skills?`<div class="ucard-desc"><b>${p.skillsLabel}</b> ${c.skills}</div>`:''}
    ${c.about?`<div class="ucard-desc">${c.about}</div>`:''}
    <div class="ucard-contact">${contactBtn}</div>
  </div>`;
}

(function init() {
  const t = localStorage.getItem('jobsil_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('btnTheme').textContent = t === 'light' ? '🌙' : '☀️';

  // Bind language buttons
  document.querySelectorAll('[data-lang]').forEach(btn => {
    btn.addEventListener('click', () => setLang(btn.dataset.lang));
  });

  // Bind theme button
  const btnTheme = document.getElementById('btnTheme');
  if(btnTheme) btnTheme.addEventListener('click', toggleTheme);

  // Bind nav modal buttons
  const navJob = document.getElementById('navBtnJob');
  const navCv  = document.getElementById('navBtnCv');
  const secJob = document.getElementById('secBtnJob');
  const secCv  = document.getElementById('secBtnCv');
  if(navJob) navJob.addEventListener('click', () => openModal('job'));
  if(navCv)  navCv.addEventListener('click',  () => openModal('cv'));
  if(secJob) secJob.addEventListener('click', () => openModal('job'));
  if(secCv)  secCv.addEventListener('click',  () => openModal('cv'));

  // Modal close & submit buttons
  document.querySelectorAll('[data-close]').forEach(btn => {
    btn.addEventListener('click', () => closeModal(btn.dataset.close));
  });
  document.querySelectorAll('#mJobCancel').forEach(b => b.addEventListener('click', () => closeModal('job')));
  document.querySelectorAll('#mCvCancel').forEach(b  => b.addEventListener('click', () => closeModal('cv')));
  const mJobSubmit = document.getElementById('mJobSubmitBtn');
  const mCvSubmit  = document.getElementById('mCvSubmitBtn');
  if(mJobSubmit) mJobSubmit.addEventListener('click', submitJob);
  if(mCvSubmit)  mCvSubmit.addEventListener('click',  submitCv);

  setLang(localStorage.getItem('jobsil_lang') || 'ru');
  startListeners();
})();
</script>
