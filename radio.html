<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0c0c14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Radio World"/>
<title>Radio World 🌍</title>
<link rel="manifest" id="pwa-manifest"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0c0c14;
  --bg2: #13131f;
  --bg3: #1a1a28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f8;
  --text2: #8888aa;
  --text3: #44445a;
  --gold: #FFD700;
  --gold2: #FFA500;
  --cyan: #00D4FF;
  --pink: #FF6B9D;
  --green: #00E5A0;
  --purple: #B06EFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }

/* NOISE TEXTURE */
body::after {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

.app { display: flex; flex-direction: column; min-height: 100dvh; position: relative; z-index: 1; }

/* ANIMATED BG */
.bg-orb {
  position: fixed; border-radius: 50%; filter: blur(80px);
  pointer-events: none; z-index: 0; animation: float 8s ease-in-out infinite;
}
.orb1 { width: 300px; height: 300px; background: rgba(0,212,255,0.06); top: -100px; right: -50px; }
.orb2 { width: 250px; height: 250px; background: rgba(255,107,157,0.05); bottom: 100px; left: -80px; animation-delay: -4s; }
.orb3 { width: 200px; height: 200px; background: rgba(255,215,0,0.04); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -2s; }
@keyframes float { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-20px) scale(1.05)} }

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(12,12,20,0.92); backdrop-filter: blur(24px);
  border-bottom: 0.5px solid var(--border);
  padding: env(safe-area-inset-top,12px) 16px 12px;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, #00D4FF, #B06EFF);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
.logo-text span { color: var(--cyan); font-style: italic; }

.kofi-btn {
  display: flex; align-items: center; gap: 5px;
  background: #FF5E5B; border: none; border-radius: 20px;
  padding: 6px 12px; font-size: 11px; font-weight: 700;
  color: #fff; cursor: pointer; text-decoration: none;
  font-family: 'Space Grotesk', sans-serif;
  transition: transform 0.15s, opacity 0.15s;
}
.kofi-btn:hover { transform: translateY(-1px); opacity: 0.9; }
.kofi-btn svg { width: 15px; height: 15px; }

/* LANGUAGE SWITCHER */
.lang-bar { display: flex; gap: 4px; }
.lang-btn {
  flex: 1; padding: 6px; font-size: 11px; font-weight: 600;
  border: 0.5px solid var(--border); border-radius: 8px;
  background: transparent; color: var(--text2); cursor: pointer;
  transition: all 0.15s; font-family: 'Space Grotesk', sans-serif;
  text-align: center;
}
.lang-btn.active { background: var(--bg3); color: var(--text); border-color: var(--border2); }

/* COUNTRY TABS */
.country-tabs { display: flex; gap: 6px; padding: 12px 16px 0; overflow-x: auto; scrollbar-width: none; }
.country-tabs::-webkit-scrollbar { display: none; }
.ctab {
  flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 20px; cursor: pointer;
  font-size: 13px; font-weight: 600; transition: all 0.2s;
  border: 0.5px solid var(--border); background: transparent; color: var(--text2);
  font-family: 'Space Grotesk', sans-serif;
}
.ctab.active { color: #fff; border-color: transparent; }
.ctab-ua.active { background: linear-gradient(135deg, #005BBB, #FFD700); }
.ctab-ru.active { background: linear-gradient(135deg, #CC0000, #1C3578); }
.ctab-il.active { background: linear-gradient(135deg, #0038b8, #fff, #0038b8); color: #0038b8; }
.ctab-us.active { background: linear-gradient(135deg, #B22234, #3C3B6E); }
.ctab-all.active { background: linear-gradient(135deg, var(--cyan), var(--purple)); }

/* CONTENT */
.content { flex: 1; padding: 16px; padding-bottom: calc(env(safe-area-inset-bottom,0px) + 140px); overflow-y: auto; }

/* NOW PLAYING BAR */
.now-playing {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(12,12,20,0.97); backdrop-filter: blur(30px);
  border-top: 0.5px solid var(--border2);
  padding: 12px 16px;
  padding-bottom: calc(env(safe-area-inset-bottom,0px) + 12px);
}
.np-inner { display: flex; align-items: center; gap: 12px; }
.np-art {
  width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; position: relative; overflow: hidden;
}
.np-art.playing::after {
  content: ''; position: absolute; inset: 0; border-radius: 12px;
  border: 1.5px solid var(--cyan); animation: ring 1.5s ease-in-out infinite;
}
@keyframes ring { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(1.08)} }
.np-info { flex: 1; min-width: 0; }
.np-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-meta { font-size: 11px; color: var(--text2); margin-top: 1px; }
.np-controls { display: flex; align-items: center; gap: 8px; }
.np-vol { display: flex; align-items: center; gap: 6px; }
.vol-slider {
  -webkit-appearance: none; width: 70px; height: 3px;
  background: var(--bg3); border-radius: 2px; outline: none;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: var(--cyan); cursor: pointer;
}
.play-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  border: none; cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 18px; transition: transform 0.15s;
  box-shadow: 0 0 20px rgba(0,212,255,0.3);
  flex-shrink: 0;
}
.play-btn:active { transform: scale(0.93); }
.stop-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.07); border: 0.5px solid var(--border2);
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 14px; transition: all 0.15s;
  flex-shrink: 0;
}
.stop-btn:active { background: rgba(255,255,255,0.12); }

/* EQUALIZER BARS */
.eq { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
.eq-bar { width: 3px; border-radius: 2px; background: var(--cyan); animation: eq 0.8s ease-in-out infinite; }
.eq-bar:nth-child(1) { animation-delay: 0s; }
.eq-bar:nth-child(2) { animation-delay: 0.15s; }
.eq-bar:nth-child(3) { animation-delay: 0.3s; }
.eq-bar:nth-child(4) { animation-delay: 0.1s; }
.eq-bar:nth-child(5) { animation-delay: 0.25s; }
@keyframes eq {
  0%,100%{height:4px;opacity:.5}
  50%{height:14px;opacity:1}
}
.eq.paused .eq-bar { animation-play-state: paused; height: 4px; opacity: 0.3; }

/* RADIO CARDS */
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700;
  margin-bottom: 14px; margin-top: 4px;
  display: flex; align-items: center; gap: 10px;
}
.section-title small { font-size: 12px; color: var(--text2); font-family: 'Space Grotesk', sans-serif; font-weight: 400; }

.radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
@media (min-width: 500px) { .radio-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }

.radio-card {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: 16px; padding: 14px; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.radio-card::before {
  content: ''; position: absolute; inset: 0; opacity: 0;
  transition: opacity 0.3s;
  background: linear-gradient(135deg, rgba(0,212,255,0.08), rgba(176,110,255,0.06));
}
.radio-card:hover { transform: translateY(-2px); border-color: var(--border2); }
.radio-card:hover::before { opacity: 1; }
.radio-card.playing {
  border-color: var(--cyan);
  box-shadow: 0 0 20px rgba(0,212,255,0.15);
}
.radio-card.playing::before { opacity: 1; }

.card-flag { font-size: 28px; margin-bottom: 8px; }
.card-name { font-size: 13px; font-weight: 700; margin-bottom: 3px; line-height: 1.3; }
.card-genre { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
.card-freq { font-size: 10px; color: var(--text3); }
.card-playing-badge {
  position: absolute; top: 10px; right: 10px;
  background: var(--cyan); border-radius: 20px;
  padding: 2px 7px; font-size: 9px; font-weight: 700; color: #000;
  opacity: 0; transition: opacity 0.2s;
}
.radio-card.playing .card-playing-badge { opacity: 1; }

.card-eq { margin-top: 4px; }

/* COUNTRY SECTION */
.country-section { margin-bottom: 24px; }
.country-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px; padding-bottom: 10px;
  border-bottom: 0.5px solid var(--border);
}
.country-flag { font-size: 24px; }
.country-name { font-size: 16px; font-weight: 700; }
.country-count { font-size: 11px; color: var(--text2); margin-left: auto; }

/* STATUS */
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 4px; animation: pulse2 2s infinite; }
@keyframes pulse2 { 0%,100%{opacity:1} 50%{opacity:.3} }
.loading-txt { color: var(--text3); font-size: 12px; }
.error-badge { background: rgba(255,75,110,.15); color: #FF4B6E; font-size: 10px; padding: 2px 8px; border-radius: 20px; }

/* SEARCH */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-inp {
  width: 100%; background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: 12px; padding: 10px 14px 10px 38px;
  font-size: 13px; color: var(--text); font-family: 'Space Grotesk', sans-serif;
}
.search-inp::placeholder { color: var(--text3); }
.search-inp:focus { outline: none; border-color: var(--border2); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text3); }

.empty { color: var(--text3); text-align: center; padding: 30px 0; font-size: 13px; }
</style>
</head>
<body>

<div class="app">

<!-- HEADER -->

</div>

// TRANSLATIONS
const T = {

  uk: { all:'Всі', ukraine:'Україна', russia:'Росія', israel:'Ізраїль', usa:'США', choose_station:'Оберіть станцію', ready:'Готово до відтворення', playing:'Слухаємо', loading:'Підключення...', error:'Помилка з\'єднання', search:'Пошук станцій...', stations:'станцій', live:'ЕФІР' },

};

let lang = 'ru';
let country = 'all';
let currentStation = null;
let isPlaying = false;
let isLoading = false;
const audio = document.getElementById('audio');

function t(key) { return T[lang][key] || key; }

function setLang(l, el) {
  lang = l;
  document.documentElement.lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('[data-t]').forEach(el => { const k=el.getAttribute('data-t'); if(T[lang][k]) el.textContent=T[lang][k]; });
  document.getElementById('search').placeholder = t('search');
  renderStations();
}

function setCountry(c, el) {
  country = c;
  document.querySelectorAll('.ctab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderStations();
}

function getDisplayName(s) {
  return s.tags[lang] || s.name;
}

function renderStations() {
  const query = document.getElementById('search').value.toLowerCase();
  const container = document.getElementById('stations-container');

  let filtered = STATIONS.filter(s => {
    const matchCountry = country === 'all' || s.country === country;
    const matchSearch = !query || s.name.toLowerCase().includes(query) || getDisplayName(s).toLowerCase().includes(query) || s.genre.toLowerCase().includes(query);
    return matchCountry && matchSearch;
  });

  if (!filtered.length) {
    container.innerHTML = `<div class="empty">📻 ${t('search')}...</div>`;
    return;
  }

  if (country === 'all' && !query) {
    const groups = { ua: '🇺🇦', ru: '🇷🇺', il: '🇮🇱', us: '🇺🇸' };
    const names = { ua: t('ukraine'), ru: t('russia'), il: t('israel'), us: t('usa') };
    let html = '';
    Object.keys(groups).forEach(c => {
      const list = filtered.filter(s => s.country === c);
      if (!list.length) return;
      html += `<div class="country-section">
        <div class="country-header">
          <span class="country-flag">${groups[c]}</span>
          <span class="country-name">${names[c]}</span>
          <span class="country-count">${list.length} ${t('stations')}</span>
        </div>
        <div class="radio-grid">${list.map(renderCard).join('')}</div>
      </div>`;
    });
    container.innerHTML = html;
  } else {
    container.innerHTML = `<div class="radio-grid">${filtered.map(renderCard).join('')}</div>`;
  }
}

function renderCard(s) {
  const playing = currentStation && currentStation.id === s.id;
  return `<div class="radio-card${playing?' playing':''}" onclick="playStation('${s.id}')">
    <div class="card-flag">${s.flag}</div>
    <div class="card-name">${getDisplayName(s)}</div>
    <div class="card-genre">${s.genre}</div>
    <div class="card-freq">${s.freq}</div>
    <div class="card-playing-badge">${t('live')}</div>
    ${playing ? `<div class="card-eq"><div class="eq${isPlaying?'':' paused'}"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div></div>` : ''}
  </div>`;
}

function playStation(id) {
  const s = STATIONS.find(s => s.id === id);
  if (!s) return;

  currentStation = s;
  isLoading = true;
  isPlaying = false;

  document.getElementById('np-art').textContent = s.flag;
  document.getElementById('np-art').className = 'np-art';
  document.getElementById('np-name').textContent = getDisplayName(s);
  document.getElementById('np-status').textContent = t('loading');
  document.getElementById('status-dot').style.display = 'inline-block';
  document.getElementById('play-btn').textContent = '⏸';
  document.getElementById('eq').className = 'eq paused';

  audio.src = s.url;
  audio.volume = document.getElementById('vol').value / 100;
  audio.load();
  audio.play().then(() => {
    isPlaying = true;
    isLoading = false;
    document.getElementById('np-art').className = 'np-art playing';
    document.getElementById('np-status').textContent = t('playing') + ' • ' + s.genre;
    document.getElementById('eq').className = 'eq';
    renderStations();
  }).catch(e => {
    isLoading = false;
    document.getElementById('np-status').textContent = t('error');
    document.getElementById('status-dot').style.display = 'none';
    document.getElementById('eq').className = 'eq paused';
    document.getElementById('play-btn').textContent = '▶';
  });

  renderStations();
}

function togglePlay() {
  if (!currentStation) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    document.getElementById('play-btn').textContent = '▶';
    document.getElementById('eq').className = 'eq paused';
    document.getElementById('np-art').className = 'np-art';
  } else {
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('play-btn').textContent = '⏸';
      document.getElementById('eq').className = 'eq';
      document.getElementById('np-art').className = 'np-art playing';
    }).catch(() => { playStation(currentStation.id); });
  }
  renderStations();
}

function stopRadio() {
  audio.pause();
  audio.src = '';
  isPlaying = false;
  currentStation = null;
  document.getElementById('np-art').textContent = '📻';
  document.getElementById('np-art').className = 'np-art';
  document.getElementById('np-name').setAttribute('data-t','choose_station');
  document.getElementById('np-name').textContent = t('choose_station');
  document.getElementById('np-status').textContent = t('ready');
  document.getElementById('status-dot').style.display = 'none';
  document.getElementById('play-btn').textContent = '▶';
  document.getElementById('eq').className = 'eq paused';
  renderStations();
}

function setVolume(v) {
  audio.volume = v / 100;
}

audio.addEventListener('error', () => {
  document.getElementById('np-status').textContent = t('error');
  document.getElementById('eq').className = 'eq paused';
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶';
});

// INIT
renderStations();
</script>
