<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio World - Premium Player</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #bb86fc;
            --text: #ffffff;
            --subtext: #9494A3;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #0a0a0c 80%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header { padding: 40px 20px; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 10px; }

        .lang-picker { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .lang-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .lang-btn:hover { border-color: var(--accent); }

        .container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
            margin-bottom: 120px;
        }

        .station-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .station-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
        }

        .station-card.active { border-color: var(--accent); background: rgba(187, 134, 252, 0.1); }

        .station-icon { font-size: 30px; margin-bottom: 10px; display: block; }

        /* Фиксированный плеер внизу */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 20, 0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 100;
        }

        .controls { display: flex; align-items: center; gap: 20px; }
        .play-btn {
            background: var(--accent);
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 20px;
        }

        .now-playing { display: flex; flex-direction: column; min-width: 200px; }
        .station-title { font-weight: 600; color: #fff; }
        .status { font-size: 0.8rem; color: var(--subtext); }

        .volume-slider { cursor: pointer; accent-color: var(--accent); }

        .kofi-btn {
            position: absolute;
            right: 20px;
            top: 20px;
        }

        [dir="rtl"] { text-align: right; }
    </style>
</head>
<body>

<div class="kofi-btn">
    <a href="https://ko-fi.com" target="_blank">
        <img src="https://ko-fi.com" height="36" alt="Ko-fi">
    </a>
</div>

<header>
    <h1 id="main-title">Мировое Радио</h1>
    <div class="lang-picker">
        <button class="lang-btn" onclick="setLang('ru')">Русский</button>
        <button class="lang-btn" onclick="setLang('ua')">Українська</button>
        <button class="lang-btn" onclick="setLang('he')">עברית</button>
    </div>
</header>

<div class="container" id="grid"></div>

<div class="player-bar">
    <div class="now-playing">
        <span class="status" id="status-text">Выберите станцию</span>
        <span class="station-title" id="current-name">-</span>
    </div>
    
    <div class="controls">
        <button class="play-btn" id="master-play" onclick="togglePlay()">▶</button>
        <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.8" oninput="changeVolume(this.value)">
    </div>
</div>

<audio id="core-player"></audio>

<script>
    const stations = [
    // --- ИЗРАИЛЬ ---
    { name: "Galgalatz", url: "https://bynetcdn.com", icon: "🇮🇱", lang: "he" },
    { name: "Kan Gimel", url: "https://kan.org.il", icon: "🎸", lang: "he" },
    { name: "Eco 99 FM", url: "https://seeme.co.il", icon: "🌱", lang: "he" },
    { name: "103FM", url: "https://seeme.co.il", icon: "🎙️", lang: "he" },
    { name: "Radius 100FM", url: "https://seeme.co.il", icon: "📻", lang: "he" },
    { name: "Pervoye Radio", url: "https://seeme.co.il", icon: "🇷🇺", lang: "he" }, // Русскоязычное в Израиле
    { name: "Kol BaRama", url: "https://kol-barama.co.il", icon: "🕍", lang: "he" },

    // --- УКРАИНА ---
    { name: "Radio Roks", url: "https://radioroks.ua", icon: "🤘", lang: "ua" },
    { name: "Hit FM", url: "https://hitfm.ua", icon: "🔥", lang: "ua" },
    { name: "Kiss FM", url: "https://kissfm.ua", icon: "🎧", lang: "ua" },
    { name: "Lux FM", url: "https://luxnet.ua", icon: "✨", lang: "ua" },
    { name: "Nashe Radio", url: "https://nasheradio.ua", icon: "🇺🇦", lang: "ua" },
    { name: "Radio NV", url: "https://radio-nv.com.ua", icon: "🗣️", lang: "ua" },
    { name: "Army FM", url: "https://armyfm.com.ua", icon: "🎖️", lang: "ua" },

    // --- РОССИЯ ---
    { name: "Europa Plus", url: "https://hostingradio.ru", icon: "🎵", lang: "ru" },
    { name: "Retro FM", url: "https://hostingradio.ru", icon: "🕺", lang: "ru" },
    { name: "Radio Record", url: "https://hostingradio.ru", icon: "🚀", lang: "ru" },
    { name: "Dorozhnoe", url: "https://hostingradio.ru", icon: "🚗", lang: "ru" },
    { name: "Russkoe Radio", url: "https://hostingradio.ru", icon: "🇷🇺", lang: "ru" },
    { name: "Vesti FM", url: "https://cdnvideo.ru", icon: "📢", lang: "ru" },
    { name: "Radio Mayak", url: "https://cdnvideo.ru", icon: "⚓", lang: "ru" }
];


    const audio = document.getElementById('core-player');
    const playBtn = document.getElementById('master-play');
    let currentUrl = "";

    function init() {
        const grid = document.getElementById('grid');
        stations.forEach(s => {
            const card = document.createElement('div');
            card.className = 'station-card';
            card.innerHTML = `<span class="station-icon">${s.icon}</span><strong>${s.name}</strong>`;
            card.onclick = () => play(s.url, s.name);
            grid.appendChild(card);
        });
    }

    function play(url, name) {
        currentUrl = url;
        audio.src = url;
        audio.play();
        document.getElementById('current-name').innerText = name;
        document.getElementById('status-text').innerText = dict[currentLang].status;
        playBtn.innerText = "⏸";
    }

    function togglePlay() {
        if (!currentUrl) return;
        if (audio.paused) { audio.play(); playBtn.innerText = "⏸"; }
        else { audio.pause(); playBtn.innerText = "▶"; }
    }

    function changeVolume(v) { audio.volume = v; }

    let currentLang = 'ru';
    function setLang(l) {
        currentLang = l;
        document.getElementById('main-title').innerText = dict[l].title;
        document.body.dir = (l === 'he') ? 'rtl' : 'ltr';
        if (!currentUrl) document.getElementById('status-text').innerText = dict[l].select;
    }

    init();
</script>
</body>
</html>
